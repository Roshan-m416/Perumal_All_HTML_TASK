<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Practice</title>

    <style>
        /* Element Selector */
        p {
            color: #555;
            line-height: 1.6;
        }

        /* Class selector for intro */
        .intro {
            font-style: italic;
        }

        /* Class selector for highlight */
        .highlight {
            background-color: #f0f8ff;
            padding: 8px;
        }

        /* ID selector for header */
        #header {
            color: #2c3e50;
            font-size: 32px;
        }

        /* Additional style for box */
        .box {
            border: 1px solid #ccc;
            padding: 16px;
        }
    </style>

</head>

<body>

<h1 id="header">Welcome to CSS Practice</h1>

<p>This is a normal paragraph to show the element selector styling.</p>

<p class="intro">
This paragraph is an introduction. It uses the intro class style.
</p>

<p class="highlight">
This paragraph is highlighted with background color and padding.
</p>

<div class="box">
    <p>This content is inside a box.</p>
</div>

</body>
</html>
